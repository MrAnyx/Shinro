# docker-compose.yml
services:
    db:
        image: postgres:16-alpine
        container_name: shinro_db
        environment:
            POSTGRES_USER: shinro
            POSTGRES_PASSWORD: shinro
            POSTGRES_DB: shinro
        ports:
            - "5432:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U shinro"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    pgdata:
